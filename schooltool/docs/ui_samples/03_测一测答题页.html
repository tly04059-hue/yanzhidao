<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>选校工具 · 测一测答题页</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-base: #F5EFE7; --bg-card: #FFFFFF;
  --text-1: #2A251E; --text-2: #6B6258; --text-3: #8A8175;
  --accent: #CF7140; --accent-soft: #F1E0D3;
  --success: #5F8C6E;
  --divider: #E8E1D5; --border: #ECE5D8;
  --serif: "Noto Serif SC", serif; --sans: "Noto Sans SC", sans-serif;
  --shadow: 0 2px 8px rgba(60,50,40,0.04);
  --shadow-lg: 0 4px 16px rgba(60,50,40,0.06);
  --shadow-cta: 0 6px 20px rgba(207,113,64,0.22);
}
body { background: #2a2a2a; padding: 40px; font-family: var(--sans); }
.screen { width: 750px; height: 1624px; background: var(--bg-base); margin: 0 auto; position: relative; padding: 32px 56px 56px; color: var(--text-1); box-shadow: 0 20px 60px rgba(0,0,0,0.4); display: flex; flex-direction: column; }

/* 顶部导航 */
.nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.back-btn { width: 64px; height: 64px; background: var(--bg-card); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
.back-btn svg { width: 28px; height: 28px; stroke: var(--text-1); stroke-width: 2.4; fill: none; }
.progress-label { font-family: var(--sans); font-weight: 500; font-size: 24px; color: var(--text-1); letter-spacing: 0.02em; }
.progress-label .sep { color: var(--text-3); margin: 0 4px; }
.nav-spacer { width: 64px; }

/* 进度条 */
.progress-bar { height: 8px; background: var(--divider); border-radius: 999px; overflow: hidden; margin-bottom: 56px; }
.progress-bar .fill { width: 37.5%; height: 100%; background: var(--accent); border-radius: 999px; }

/* 题目 */
.question { font-family: var(--serif); font-weight: 600; font-size: 52px; line-height: 1.3; margin-bottom: 22px; letter-spacing: 0.01em; }
.question-sub { font-family: var(--sans); font-weight: 400; font-size: 24px; line-height: 1.7; color: var(--text-2); margin-bottom: 56px; }

/* 选项 */
.options { display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }
.option { background: var(--bg-card); border-radius: 18px; box-shadow: var(--shadow); padding: 32px 36px; display: flex; align-items: center; gap: 24px; border: 0.5px solid var(--border); }
.option.selected { box-shadow: var(--shadow-lg); border: 1px solid var(--accent); background: var(--bg-card); }
.radio { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent-soft); background: var(--bg-card); flex-shrink: 0; position: relative; }
.option.selected .radio { border-color: var(--accent); }
.option.selected .radio::after { content: ''; position: absolute; inset: 5px; background: var(--accent); border-radius: 50%; }
.option-label { font-family: var(--sans); font-weight: 500; font-size: 28px; color: var(--text-1); letter-spacing: 0.01em; }

/* 答案附加说明(可选) */
.option-hint { font-family: var(--sans); font-size: 18px; color: var(--text-3); margin-top: 4px; }

/* 底部 CTA */
.cta-area { margin-top: auto; }
.cta-row { display: grid; grid-template-columns: 1fr 2fr; gap: 14px; margin-bottom: 18px; }
.cta-skip { background: var(--bg-card); border: 0.5px solid var(--border); color: var(--text-2); border-radius: 999px; height: 88px; font-family: var(--sans); font-weight: 500; font-size: 22px; }
.cta-next { background: var(--accent); color: white; border: none; height: 88px; border-radius: 999px; box-shadow: var(--shadow-cta); font-family: var(--sans); font-weight: 700; font-size: 24px; letter-spacing: 0.1em; display: flex; align-items: center; justify-content: center; gap: 12px; }
.cta-next svg { width: 22px; height: 22px; stroke: white; stroke-width: 2.4; fill: none; }
.cta-next:disabled, .cta-next.disabled { background: var(--accent-soft); color: rgba(255,255,255,0.7); box-shadow: none; }

/* 隐私 */
.privacy { display: flex; align-items: center; justify-content: center; gap: 14px; }
.privacy svg { width: 18px; height: 18px; stroke: var(--text-3); stroke-width: 2; fill: none; }
.privacy-text { font-family: var(--sans); font-size: 17px; color: var(--text-3); letter-spacing: 0.02em; }
</style>
</head>
<body>

<div class="screen">

  <!-- 顶部 -->
  <div class="nav-bar">
    <div class="back-btn">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke-linecap="round"/></svg>
    </div>
    <div class="progress-label">3 <span class="sep">/</span> 8</div>
    <div class="nav-spacer"></div>
  </div>
  <div class="progress-bar"><div class="fill"></div></div>

  <!-- 题目 -->
  <h1 class="question">你考研最主要的<br>目的是什么?</h1>
  <p class="question-sub">不同目的对应不同路径,这一题帮我们判断"双证 vs 单证"的权重。</p>

  <!-- 选项 -->
  <div class="options">
    <div class="option selected">
      <div class="radio"></div>
      <div>
        <div class="option-label">满足提拔 / 遴选硬条件</div>
        <div class="option-hint">最常见 · 体制内"硬要求"</div>
      </div>
    </div>
    <div class="option">
      <div class="radio"></div>
      <div>
        <div class="option-label">拿学历做长期保底</div>
        <div class="option-hint">"不一定立即用,但要有"</div>
      </div>
    </div>
    <div class="option">
      <div class="radio"></div>
      <div>
        <div class="option-label">转岗 / 跨界拓宽空间</div>
        <div class="option-hint">"想从乡镇调到市直"</div>
      </div>
    </div>
    <div class="option">
      <div class="radio"></div>
      <div>
        <div class="option-label">补一个学历短板</div>
        <div class="option-hint">本科普通批 / 想再镀金</div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-area">
    <div class="cta-row">
      <button class="cta-skip">上一题</button>
      <button class="cta-next">
        <span>下一题</span>
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="privacy">
      <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
      <div class="privacy-text">仅用于生成你的专属方案,严格保密</div>
    </div>
  </div>

</div>

</body>
</html>
