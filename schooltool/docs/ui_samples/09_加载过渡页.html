<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>选校工具 · 加载过渡页</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-base: #F5EFE7; --bg-card: #FFFFFF;
  --text-1: #2A251E; --text-2: #6B6258; --text-3: #8A8175;
  --accent: #CF7140; --accent-soft: #F1E0D3;
  --success: #5F8C6E;
  --divider: #E8E1D5; --border: #ECE5D8;
  --serif: "Noto Serif SC", serif; --sans: "Noto Sans SC", sans-serif;
}
body { background: #2a2a2a; padding: 40px; font-family: var(--sans); }
.screen { width: 750px; height: 1624px; background: var(--bg-base); margin: 0 auto; position: relative; color: var(--text-1); padding: 80px 56px 64px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); display: flex; flex-direction: column; overflow: hidden; }

/* 极淡背景光晕 */
.screen::before {
  content: '';
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(207,113,64,0.10), transparent 70%);
  pointer-events: none;
}
.screen > * { position: relative; z-index: 1; }

/* 顶部品牌 */
.brand { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 48px; }
.brand-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; }
.brand-name { font-family: var(--serif); font-weight: 600; font-size: 22px; letter-spacing: 0.32em; }

/* Loading 动画 · 圆环 */
.loading-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
.loading-ring {
  width: 200px; height: 200px;
  border: 6px solid var(--accent-soft);
  border-top: 6px solid var(--accent);
  border-radius: 50%;
  animation: spin 1.2s linear infinite;
  margin-bottom: 56px;
  position: relative;
}
.loading-ring::after {
  content: '';
  position: absolute;
  width: 88px; height: 88px;
  background: var(--bg-card);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 4px 16px rgba(60,50,40,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
}
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

.loading-icon {
  position: absolute;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-weight: 600;
  font-size: 36px;
  color: var(--accent);
}

.loading-title { font-family: var(--serif); font-weight: 600; font-size: 44px; line-height: 1.35; text-align: center; margin-bottom: 18px; letter-spacing: 0.01em; }
.loading-title .accent { color: var(--accent); }
.loading-sub { font-family: var(--sans); font-size: 22px; line-height: 1.7; color: var(--text-2); text-align: center; max-width: 520px; }

/* 进度阶段提示 */
.progress-steps { margin-top: 56px; display: flex; flex-direction: column; gap: 18px; max-width: 480px; width: 100%; }
.step { display: flex; align-items: center; gap: 16px; font-family: var(--sans); font-size: 20px; line-height: 1.5; }
.step .ico { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
.step.done .ico { background: var(--success); color: white; }
.step.done .label { color: var(--text-1); }
.step.active .ico { background: var(--accent); color: white; }
.step.active .label { color: var(--text-1); font-weight: 600; }
.step.pending .ico { background: var(--accent-soft); color: var(--accent); }
.step.pending .label { color: var(--text-3); }

/* 等待提示 */
.waiting { text-align: center; margin-top: auto; padding-top: 32px; }
.waiting-text { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--text-3); line-height: 1.7; }
.waiting-dots { display: inline-flex; gap: 4px; margin-left: 4px; }
.waiting-dots span {
  width: 6px; height: 6px;
  background: var(--text-3);
  border-radius: 50%;
  animation: dot 1.4s infinite;
}
.waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
.waiting-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

/* 主张刊尾 */
.foot { text-align: center; padding-top: 14px; border-top: 0.5px solid var(--divider); margin-top: 24px; font-family: var(--serif); font-weight: 600; font-size: 14px; letter-spacing: 0.32em; color: var(--text-3); }
</style>
</head>
<body>

<div class="screen">

  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">研 知 道</div>
  </div>

  <div class="loading-stage">
    <div style="position: relative;">
      <div class="loading-ring"></div>
      <div class="loading-icon">★</div>
    </div>
    <h1 class="loading-title">正在为你<br>生成<span class="accent">专属方案</span></h1>
    <p class="loading-sub">基于你的 8 题答案,<br>匹配 1,100+ 同行真实路径数据</p>

    <!-- 进度阶段 -->
    <div class="progress-steps">
      <div class="step done">
        <div class="ico">✓</div>
        <div class="label">分析你的职务与年龄</div>
      </div>
      <div class="step done">
        <div class="ico">✓</div>
        <div class="label">匹配适合的学历系统</div>
      </div>
      <div class="step active">
        <div class="ico">3</div>
        <div class="label">查找最匹配的院校</div>
      </div>
      <div class="step pending">
        <div class="ico">4</div>
        <div class="label">生成投入与收益预估</div>
      </div>
    </div>
  </div>

  <div class="waiting">
    <p class="waiting-text">推荐结果约 3 秒生成<span class="waiting-dots"><span></span><span></span><span></span></span></p>
  </div>

  <div class="foot">不骗人 · 真服务</div>

</div>

</body>
</html>
