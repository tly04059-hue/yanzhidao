<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>选校工具 · 分享预览页</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-base: #F5EFE7; --bg-card: #FFFFFF; --bg-soft: #F0E9DD;
  --text-1: #2A251E; --text-2: #6B6258; --text-3: #8A8175;
  --accent: #CF7140; --accent-soft: #F1E0D3;
  --success: #5F8C6E; --success-soft: #DAE5DC;
  --divider: #E8E1D5; --border: #ECE5D8;
  --wechat-green: #07C160;
  --serif: "Noto Serif SC", serif; --sans: "Noto Sans SC", sans-serif;
}
body { background: #2a2a2a; padding: 40px; font-family: var(--sans); }
.screen { width: 750px; height: 1624px; background: #232020; margin: 0 auto; color: white; position: relative; padding: 32px 40px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); display: flex; flex-direction: column; }

/* 顶部 */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.tb-btn { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; }
.tb-btn svg { width: 28px; height: 28px; stroke: white; stroke-width: 2.4; fill: none; }
.tb-title { font-family: var(--sans); font-weight: 500; font-size: 28px; color: white; }

/* 提示语 */
.tip { text-align: center; font-family: var(--sans); font-size: 19px; color: rgba(255,255,255,0.72); margin-bottom: 28px; letter-spacing: 0.04em; }
.tip strong { color: white; font-weight: 600; }

/* 海报预览(等比缩放) */
.poster-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 12px; margin-bottom: 28px; }
.poster-frame {
  width: 100%;
  max-width: 600px;
  aspect-ratio: 1080 / 1620;
  background: var(--bg-base);
  color: var(--text-1);
  border-radius: 20px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
  font-family: var(--sans);
  padding: 44px 40px;
  display: flex;
  flex-direction: column;
}
.poster-frame::before { content: ''; position: absolute; top: 8%; left: 50%; transform: translateX(-50%); width: 450px; height: 450px; background: radial-gradient(circle, rgba(207,113,64,0.10), transparent 70%); }
.poster-frame > * { position: relative; z-index: 1; }
.p-mast { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 10px; border-bottom: 1px solid var(--text-1); margin-bottom: 28px; }
.p-mast-l { display: flex; gap: 10px; align-items: flex-start; }
.p-mast-sq { width: 8px; height: 8px; background: var(--accent); margin-top: 5px; }
.p-mast-name { font-family: var(--serif); font-weight: 600; font-size: 16px; letter-spacing: 0.32em; }
.p-mast-sub { font-family: var(--serif); font-size: 10px; color: var(--text-2); margin-top: 4px; letter-spacing: 0.18em; }
.p-mast-r { font-family: var(--serif); font-size: 10px; color: var(--text-3); letter-spacing: 0.18em; }
.p-kicker { text-align: center; font-family: var(--sans); font-weight: 500; font-size: 13px; color: var(--accent); letter-spacing: 0.32em; text-transform: uppercase; margin-bottom: 22px; }
.p-card { background: var(--bg-card); border-radius: 16px; border: 0.5px solid var(--border); padding: 32px 28px; text-align: center; box-shadow: 0 2px 8px rgba(60,50,40,0.04); margin-bottom: 24px; }
.p-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-weight: 600; font-size: 26px; color: var(--accent); margin: 0 auto 18px; }
.p-tag { display: inline-block; background: var(--accent-soft); color: var(--accent); padding: 4px 14px; border-radius: 999px; font-family: var(--sans); font-weight: 500; font-size: 13px; letter-spacing: 0.16em; margin-bottom: 14px; }
.p-title { font-family: var(--serif); font-weight: 600; font-size: 32px; line-height: 1.3; margin-bottom: 12px; }
.p-sub { font-family: var(--sans); font-size: 14px; line-height: 1.7; color: var(--text-2); }
.p-stats { background: var(--bg-card); border-radius: 14px; border: 0.5px solid var(--border); padding: 18px; margin-bottom: 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.p-stat { text-align: center; }
.p-stat .v { font-family: var(--serif); font-weight: 600; font-size: 22px; }
.p-stat .v.green { color: var(--success); }
.p-stat .v.warm { color: var(--accent); }
.p-stat .l { font-family: var(--sans); font-size: 10px; color: var(--text-3); margin-top: 3px; letter-spacing: 0.06em; }
.p-qr-row { display: flex; gap: 16px; align-items: center; background: var(--bg-card); border: 0.5px solid var(--border); padding: 18px; border-radius: 14px; margin-top: auto; margin-bottom: 18px; }
.p-qr { width: 70px; height: 70px; background: white; border: 1px solid var(--text-1); flex-shrink: 0; font-family: monospace; font-size: 8px; color: var(--text-3); display: flex; align-items: center; justify-content: center; }
.p-qr-info .lbl { font-family: var(--sans); font-weight: 500; font-size: 13px; color: var(--accent); letter-spacing: 0.16em; margin-bottom: 4px; }
.p-qr-info .t { font-family: var(--serif); font-weight: 600; font-size: 16px; line-height: 1.4; }
.p-foot { padding-top: 10px; border-top: 1px solid var(--text-1); display: flex; justify-content: space-between; font-family: var(--serif); font-weight: 600; font-size: 11px; letter-spacing: 0.32em; }
.p-foot .r { font-weight: 400; color: var(--text-3); letter-spacing: 0.12em; }

/* 分享渠道 */
.share-channels { background: var(--bg-card); border-radius: 24px; padding: 28px 24px 20px; color: var(--text-1); }
.channel-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.channel { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 12px 4px; }
.channel-icon { width: 76px; height: 76px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-weight: 700; font-size: 30px; color: white; }
.channel-icon.wechat { background: var(--wechat-green); }
.channel-icon.timeline { background: var(--wechat-green); }
.channel-icon.save { background: var(--accent); }
.channel-icon.copy { background: var(--bg-soft); color: var(--text-2); }
.channel-name { font-family: var(--sans); font-size: 18px; font-weight: 500; color: var(--text-1); letter-spacing: 0.02em; }

/* 提示底部 */
.share-tip { text-align: center; padding: 14px 0 4px; border-top: 0.5px solid var(--divider); font-family: var(--sans); font-size: 16px; color: var(--text-3); line-height: 1.6; }
.share-tip strong { color: var(--accent); font-weight: 500; }

/* 取消按钮 */
.cancel { margin-top: 18px; padding: 20px; text-align: center; background: var(--bg-card); border-radius: 14px; font-family: var(--sans); font-weight: 500; font-size: 22px; color: var(--text-2); letter-spacing: 0.02em; }
</style>
</head>
<body>

<div class="screen">

  <!-- 顶部 -->
  <div class="topbar">
    <div class="tb-btn"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round"/><line x1="6" y1="18" x2="18" y2="6" stroke-linecap="round"/></svg></div>
    <div class="tb-title">分享你的方案</div>
    <div class="tb-btn"></div>
  </div>

  <div class="tip">长按 <strong>保存图片</strong>,或选择下方渠道直接分享</div>

  <!-- 海报预览 -->
  <div class="poster-wrap">
    <div class="poster-frame">
      <header class="p-mast">
        <div class="p-mast-l">
          <div class="p-mast-sq"></div>
          <div>
            <div class="p-mast-name">研 知 道</div>
            <div class="p-mast-sub">川渝在职考研</div>
          </div>
        </div>
        <div class="p-mast-r">测评 · 042</div>
      </header>

      <div class="p-kicker">我的考研决策方案</div>

      <div class="p-card">
        <div class="p-icon">★</div>
        <span class="p-tag">基于 8 题诊断</span>
        <h1 class="p-title">推荐路径:<br>非全日制 MPA</h1>
        <p class="p-sub">兼顾体制内工作与<br>学历提升的最佳平衡点</p>
      </div>

      <div class="p-stats">
        <div class="p-stat"><div class="v warm">中等</div><div class="l">综合投入</div></div>
        <div class="p-stat"><div class="v green">较高</div><div class="l">职业收益</div></div>
        <div class="p-stat"><div class="v">92%</div><div class="l">匹配度</div></div>
      </div>

      <div class="p-qr-row">
        <div class="p-qr">[ QR ]</div>
        <div class="p-qr-info">
          <div class="lbl">扫码也测一测</div>
          <div class="t">3 分钟看见<br>适合你的路径</div>
        </div>
      </div>

      <div class="p-foot">
        <div>不骗人 · 真服务</div>
        <div class="r">研知道·川渝</div>
      </div>
    </div>
  </div>

  <!-- 分享渠道 -->
  <div class="share-channels">
    <div class="channel-row">
      <div class="channel">
        <div class="channel-icon wechat">微</div>
        <div class="channel-name">微信好友</div>
      </div>
      <div class="channel">
        <div class="channel-icon timeline">○</div>
        <div class="channel-name">朋友圈</div>
      </div>
      <div class="channel">
        <div class="channel-icon save">↓</div>
        <div class="channel-name">保存图片</div>
      </div>
      <div class="channel">
        <div class="channel-icon copy">⎘</div>
        <div class="channel-name">复制链接</div>
      </div>
    </div>
    <div class="share-tip">
      分享给同行,<strong>双方都领</strong> ¥50 备考资料券
    </div>
  </div>

  <div class="cancel">取消</div>

</div>

</body>
</html>
